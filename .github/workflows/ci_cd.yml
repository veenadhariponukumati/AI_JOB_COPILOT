name: AI Job Copilot CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503,E203

      - name: Check formatting with black
        run: |
          black --check --line-length=120 src/ tests/

      - name: Check import ordering
        run: |
          isort --check-only --profile black src/ tests/

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_job_copilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_job_copilot_test
          OPENAI_API_KEY: test_key
        run: |
          pytest tests/unit/ -v --tb=short --cov=src --cov-report=xml

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_job_copilot_test
          OPENAI_API_KEY: test_key
        run: |
          pytest tests/integration/ -v --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate imports
        run: |
          python -c "from src.api.main import app; print('FastAPI app imports OK')"
          python -c "from src.database.models import Base; print('Models import OK')"
          python -c "from src.nlp.parser import DocumentParser; print('Parser import OK')"
          python -c "from src.matching.engine import HybridMatchingEngine; print('Engine import OK')"

      - name: Check for syntax errors
        run: |
          python -m py_compile src/api/main.py
          python -m py_compile src/database/models.py
          python -m py_compile src/nlp/parser.py
          python -m py_compile src/nlp/extractor.py
          python -m py_compile src/rag/chunker.py
          python -m py_compile src/matching/engine.py

# Deployment is not handled by this workflow. The backend deploys via
# Render's own GitHub integration (auto-deploy on push to main, using
# render.yaml). The frontend deploys via Vercel's GitHub integration.
# This workflow is CI only: lint, test, and a basic import/build check.
